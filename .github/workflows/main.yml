            - name: Setup Ionic
  # You may pin to the exact commit or the version.
  # uses: coturiv/setup-ionic@f2df4aec71522c35f441b19d5b8c81c2440076f6
  uses: coturiv/setup-ionic@v1.0.4
  with:
    # Version range or exact version of Cordova to use
    cordova-version: # optional, default is 10
    # Version range or exact version of Ionic to use
    ionic-version: # optional
    # Whether to install Java
    install-java: # optional, default is true
    # Whether to install CocoaPods
    install-pods: # optional, default is true
          
