<div class="home-page">
  <ion-header>
    <ion-toolbar>
      <ion-title>Home</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <ion-card *ngFor="let product of products">
      <img [src]="product.image" />
      <ion-card-header>
        <ion-card-title>{{ product.name }}</ion-card-title>
        <ion-card-subtitle>{{ product.price | currency }}</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <p>{{ product.description }}</p>
        <ion-button [routerLink]="['/product', product.id]">View Details</ion-button>
      </ion-card-content>
    </ion-card>
  </ion-content>
</div>
