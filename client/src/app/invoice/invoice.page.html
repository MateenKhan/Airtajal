<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Invoice</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item-sliding *ngFor="let item of items;let i=index">
      <ion-item-options side="start">
        <ion-item-option color="light" class="ion-activatable ">
          <ion-checkbox (ionChange)="calculateTotal()" [(ngModel)]="item.selected" [checked]="item.selected"></ion-checkbox>
          <ion-ripple-effect type="unbounded"></ion-ripple-effect>
        </ion-item-option>
      </ion-item-options>

      <ion-item>
        <ion-label  slot="start">{{item.name}}</ion-label>
        <ion-label slot="end">{{item.price}}</ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" expandable="true" (click)="delete(i)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>

  </ion-list>

  <ion-row class="divider"></ion-row>
  <ion-row>
    <ion-col size-xs=2></ion-col>
    <ion-col size-xs=3><h3>Total</h3></ion-col>
    <ion-col size-xs=1><h3>:</h3></ion-col>
    <ion-col size-xs=4><h3>{{total}}</h3></ion-col>
    <ion-col size-xs=2>
      <ion-item class="b-r ion-activatable " color="success" (click)="calculateTotal()">
        <ion-icon name="refresh"></ion-icon>
        <ion-ripple-effect type="unbounded"></ion-ripple-effect>
      </ion-item>
    </ion-col>
  </ion-row>


</ion-content>
